# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
  # End - Generic Boilerplate Variables Setup
  - name: vpc_enabled
    order: 2
    description: "Enable VPC Module dependency"
    type: bool
    default: true
  - name: vpc_path
    order: 3
    description: "Path to VPC Module, required if vpc_enabled is true"
    type: string
    default: "../vpc"
  - name: vpc_subnets
    order: 4
    description: "VPC Subnets scope, required if vpc_enabled is true, options: private, intra"
    type: enum
    default: intra
    allowed_values:
      - private
      - intra
  - name: tgw_enabled
    order: 5
    description: "Enable TGW Module dependency"
    type: bool
    default: true
  - name: tgw_path
    order: 6
    description: "Path to TGW Module, required if tgw_enabled is true"
    type: string
    default: "../tgw"

hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"